<!DOCTYPE html>
<html>
<head>
    <title>NoteSwift</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            padding: 10px 15px;
            margin: 10px 5px 10px 0;
            cursor: pointer;
        }

        #output {
            background: white;
            padding: 10px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<h1>📘 NoteSwift</h1>

<textarea id="input" placeholder="Paste your notes / PDF content here"></textarea>

<br>

<button onclick="generateNotes()">Generate Notes</button>
<button onclick="saveNotes()">Save Notes</button>
<button onclick="downloadNotes()">Download Notes</button>

<h2>Generated Notes</h2>
<div id="output"></div>

<h2>Saved Notes</h2>
<ul id="savedList"></ul>

<script>

let generated = "";

// Generate Notes
async function generateNotes() {
    const content = document.getElementById("input").value;

    const res = await fetch("https://noteswift-backend.onrender.com/generate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ content })
    });

    const data = await res.json();

    document.getElementById("output").innerText = data.notes;
}

    

// Save Notes
async function saveNotes() {
    await fetch("fetch("fetch("https://noteswift-backend.onrender.com/save")/save")
fetch("https://noteswift-backend.onrender.com/notes")", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ notes: generated })
    });

    alert("Saved Successfully!");
    loadNotes();
}

// Load Saved Notes
async function saveNotes() {
    const notes = document.getElementById("output").innerText;

    await fetch("https://noteswift-backend.onrender.com/save", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ notes })
    });

    alert("Notes saved!");
}

// Download Notes
function downloadNotes() {
    const blob = new Blob([generated], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "notes.txt";
    a.click();
}

// Load notes on page load
loadNotes();

</script>

</body>
</html>
