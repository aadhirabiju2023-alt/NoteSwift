<!DOCTYPE html>
<html>
<head>
    <title>NoteSwift</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            padding: 10px 15px;
            margin: 10px 5px 10px 0;
            cursor: pointer;
        }

        #output {
            background: white;
            padding: 10px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<h1>📘 NoteSwift</h1>

<textarea id="input" placeholder="Paste your notes / PDF content here"></textarea>

<br>

<button onclick="generateNotes()">Generate Notes</button>
<button onclick="saveNotes()">Save Notes</button>
<button onclick="downloadNotes()">Download Notes</button>

<h2>Generated Notes</h2>
<div id="output"></div>

<h2>Saved Notes</h2>
<ul id="savedList"></ul>

<script>

let generated = "";

// Generate Notes
async function generateNotes() {
    const content = document.getElementById("input").value;

    const res = await fetch("fetch("https://your-backend-url.onrender.com/generate")", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ content })
    });

    const data = await res.json();

    generated = data.notes;
    document.getElementById("output").innerText = generated;
}

// Save Notes
async function saveNotes() {
    await fetch("fetch("https://your-backend-url.onrender.com/save")
fetch("https://your-backend-url.onrender.com/notes")", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ notes: generated })
    });

    alert("Saved Successfully!");
    loadNotes();
}

// Load Saved Notes
async function loadNotes() {
    const res = await fetch("https://noteswift-ujx7.onrender.com");
    const data = await res.json();

    const list = document.getElementById("savedList");
    list.innerHTML = "";

    data.forEach(note => {
        const li = document.createElement("li");
        li.innerText = note;
        list.appendChild(li);
    });
}

// Download Notes
function downloadNotes() {
    const blob = new Blob([generated], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "notes.txt";
    a.click();
}

// Load notes on page load
loadNotes();

</script>

</body>
</html>
